name: "PR Auto-Labeler"

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Apply labels
      uses: actions/labeler@v5
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
        configuration-path: '.github/labeler.yml'

    - name: Add size label
      uses: actions/github-script@v8
      with:
        script: |
          const pr = context.payload.pull_request;

          // Calculate size based on additions and deletions
          const changes = pr.additions + pr.deletions;
          let sizeLabel;

          if (changes < 10) {
            sizeLabel = 'size/XS';
          } else if (changes < 50) {
            sizeLabel = 'size/S';
          } else if (changes < 250) {
            sizeLabel = 'size/M';
          } else if (changes < 1000) {
            sizeLabel = 'size/L';
          } else {
            sizeLabel = 'size/XL';
          }

          // Remove old size labels
          const currentLabels = pr.labels.map(label => label.name);
          const sizeLabels = currentLabels.filter(label => label.startsWith('size/'));

          for (const label of sizeLabels) {
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              name: label
            });
          }

          // Add new size label
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.number,
            labels: [sizeLabel]
          });

    - name: Add claude/* branch label
      if: startsWith(github.head_ref, 'claude/')
      uses: actions/github-script@v8
      with:
        script: |
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            labels: ['claude-generated', 'autonomous-work']
          });

    - name: Comment on first PR
      uses: actions/github-script@v8
      with:
        script: |
          const author = context.payload.pull_request.user.login;

          // Check if this is the author's first PR
          const prs = await github.rest.pulls.list({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'all'
          });

          const authorPRs = prs.data.filter(pr => pr.user.login === author);

          if (authorPRs.length === 1) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎉 **Welcome @${author}!** This is your first PR to this repository. Thank you for contributing!`
            });
          }
