name: Workflow Health Monitor

on:
  workflow_run:
    workflows: ["CI/CD Pipeline", "CodeQL Security Scan"]
    types:
      - completed
  schedule:
    # Generate daily health report
    - cron: '0 12 * * *'  # Noon UTC daily

jobs:
  monitor-workflows:
    name: Monitor Workflow Health
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Check workflow status
      id: check_status
      uses: actions/github-script@v7
      with:
        script: |
          const workflows = await github.rest.actions.listRepoWorkflows({
            owner: context.repo.owner,
            repo: context.repo.repo
          });

          const failedWorkflows = [];

          for (const workflow of workflows.data.workflows) {
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow.id,
              per_page: 1
            });

            if (runs.data.workflow_runs.length > 0) {
              const latestRun = runs.data.workflow_runs[0];
              if (latestRun.conclusion === 'failure') {
                failedWorkflows.push({
                  name: workflow.name,
                  url: latestRun.html_url,
                  conclusion: latestRun.conclusion
                });
              }
            }
          }

          core.setOutput('failed_count', failedWorkflows.length);
          core.setOutput('failed_workflows', JSON.stringify(failedWorkflows));

          return failedWorkflows;

    - name: Create issue for failed workflows
      if: steps.check_status.outputs.failed_count > 0
      uses: actions/github-script@v7
      with:
        script: |
          const failedWorkflows = JSON.parse('${{ steps.check_status.outputs.failed_workflows }}');

          let body = '## ⚠️ Workflow Health Alert\n\n';
          body += `**${failedWorkflows.length} workflow(s) are currently failing:**\n\n`;

          for (const workflow of failedWorkflows) {
            body += `- ❌ [${workflow.name}](${workflow.url})\n`;
          }

          body += '\n### Recommended Actions:\n';
          body += '1. Check the workflow logs for specific errors\n';
          body += '2. Review recent code changes that may have broken the build\n';
          body += '3. Run the Auto-Fix workflow if formatting issues detected\n';
          body += '4. Check Dependabot PRs for dependency conflicts\n\n';
          body += '_This issue was automatically created by the Workflow Health Monitor._';

          // Check if issue already exists
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'workflow-health'
          });

          if (issues.data.length === 0) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Workflow Health Alert: ${failedWorkflows.length} Failed Workflows`,
              body: body,
              labels: ['workflow-health', 'automated', 'bug']
            });
          } else {
            // Update existing issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues.data[0].number,
              body: body
            });
          }

    - name: Close issue if all workflows passing
      if: steps.check_status.outputs.failed_count == 0
      uses: actions/github-script@v7
      with:
        script: |
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'workflow-health'
          });

          for (const issue of issues.data) {
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'closed',
              body: issue.body + '\n\n✅ **All workflows are now passing!** Issue auto-closed.'
            });
          }

    - name: Generate health report
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const workflows = await github.rest.actions.listRepoWorkflows({
            owner: context.repo.owner,
            repo: context.repo.repo
          });

          let report = '# Workflow Health Report\n\n';
          report += `**Generated**: ${new Date().toISOString()}\n\n`;
          report += '| Workflow | Latest Status | Last Run |\n';
          report += '|----------|--------------|----------|\n';

          for (const workflow of workflows.data.workflows) {
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflow.id,
              per_page: 1
            });

            if (runs.data.workflow_runs.length > 0) {
              const run = runs.data.workflow_runs[0];
              const status = run.conclusion === 'success' ? '✅' :
                            run.conclusion === 'failure' ? '❌' :
                            '⚠️';
              report += `| ${workflow.name} | ${status} ${run.conclusion} | ${run.created_at} |\n`;
            }
          }

          console.log(report);
