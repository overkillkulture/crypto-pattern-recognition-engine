name: Auto-Fix Code Issues

on:
  push:
    branches: [ claude/* ]
  workflow_dispatch:  # Allow manual trigger
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  auto-fix:
    name: Auto-Fix Common Issues
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install auto-fix tools
      run: |
        python -m pip install --upgrade pip
        pip install black isort autopep8 autoflake

    - name: Auto-format with Black
      run: |
        black src/ tests/ examples/ || true

    - name: Sort imports with isort
      run: |
        isort src/ tests/ examples/ || true

    - name: Remove unused imports with autoflake
      run: |
        autoflake --in-place --remove-all-unused-imports --recursive src/ tests/ examples/ || true

    - name: Check for changes
      id: check_changes
      run: |
        if [[ -n $(git status -s) ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit auto-fixes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --global user.name 'GitHub Auto-Fix Bot'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        git commit -m "[Auto-Fix] Code formatting and cleanup

        - Applied Black formatting
        - Sorted imports with isort
        - Removed unused imports with autoflake

        Automated by GitHub Actions"
        git push

    - name: Comment on commit
      if: steps.check_changes.outputs.changes == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: '🤖 **Auto-Fix Applied**\n\nCode has been automatically formatted and cleaned up.'
          })
